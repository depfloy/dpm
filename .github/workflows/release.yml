name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test -v -race ./...

      - name: Build binaries
        run: make build-linux VERSION=${GITHUB_REF_NAME#v}

      - name: Generate checksums
        run: make checksums

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION=${{ github.ref_name }}

          # Upload binaries
          aws s3 cp bin/dpm-linux-amd64 s3://depfloy/dpm/${VERSION}/dpm-linux-amd64 \
            --endpoint-url $R2_ENDPOINT
          aws s3 cp bin/dpm-linux-arm64 s3://depfloy/dpm/${VERSION}/dpm-linux-arm64 \
            --endpoint-url $R2_ENDPOINT
          aws s3 cp bin/dpmd-linux-amd64 s3://depfloy/dpm/${VERSION}/dpmd-linux-amd64 \
            --endpoint-url $R2_ENDPOINT
          aws s3 cp bin/dpmd-linux-arm64 s3://depfloy/dpm/${VERSION}/dpmd-linux-arm64 \
            --endpoint-url $R2_ENDPOINT

          # Upload checksums
          aws s3 cp bin/checksums.txt s3://depfloy/dpm/${VERSION}/checksums.txt \
            --endpoint-url $R2_ENDPOINT

          # Upload install script
          aws s3 cp scripts/install.sh s3://depfloy/dpm/install.sh \
            --endpoint-url $R2_ENDPOINT

      - name: Update channel file
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NUM=${VERSION#v}

          # Determine channel
          if [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
          fi

          # Generate channel file
          CHECKSUM_AMD64=$(grep "dpm-linux-amd64" bin/checksums.txt | awk '{print $1}')
          CHECKSUM_ARM64=$(grep "dpm-linux-arm64" bin/checksums.txt | awk '{print $1}')

          cat > /tmp/channel.json << EOF
          {
            "version": "${VERSION_NUM}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "checksums": {
              "linux-amd64": "sha256:${CHECKSUM_AMD64}",
              "linux-arm64": "sha256:${CHECKSUM_ARM64}"
            },
            "release_notes": "https://github.com/depfloy/dpm/releases/tag/${VERSION}"
          }
          EOF

          aws s3 cp /tmp/channel.json s3://depfloy/dpm/channels/${CHANNEL}.json \
            --endpoint-url $R2_ENDPOINT \
            --content-type "application/json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/dpm-linux-amd64
            bin/dpm-linux-arm64
            bin/dpmd-linux-amd64
            bin/dpmd-linux-arm64
            bin/checksums.txt
          generate_release_notes: true
